<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - Python程序设计实验系统</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
            min-height: 100vh; display: flex; align-items: center; justify-content: center;
            background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 50%, #1e40af 100%);
            position: relative; overflow: hidden;
        }
        body::before {
            content: ''; position: absolute; top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: radial-gradient(circle at 30% 40%, rgba(59,130,246,.15) 0%, transparent 50%),
                        radial-gradient(circle at 70% 60%, rgba(245,158,11,.1) 0%, transparent 50%);
            animation: bgFloat 20s ease-in-out infinite;
        }
        @keyframes bgFloat { 0%,100% { transform: translate(0,0); } 50% { transform: translate(-2%,-2%); } }
        .login-container {
            position: relative; z-index: 1; width: 420px; max-width: 90vw;
        }
        .login-header {
            text-align: center; margin-bottom: 2rem; color: white;
        }
        .login-header .icon {
            width: 72px; height: 72px; margin: 0 auto 1rem;
            background: linear-gradient(135deg, #3b82f6, #f59e0b);
            border-radius: 20px; display: flex; align-items: center; justify-content: center;
            font-size: 2rem; box-shadow: 0 8px 30px rgba(59,130,246,.3);
        }
        .login-header h1 { font-size: 1.6rem; font-weight: 700; margin-bottom: .3rem; }
        .login-header p { font-size: .9rem; opacity: .7; }
        .login-card {
            background: rgba(255,255,255,.95); backdrop-filter: blur(20px);
            border-radius: 16px; padding: 2rem;
            box-shadow: 0 20px 60px rgba(0,0,0,.2);
        }
        .form-group { margin-bottom: 1.2rem; }
        .form-label { display: block; font-weight: 600; margin-bottom: .4rem; color: #334155; font-size: .9rem; }
        .input-wrapper {
            position: relative;
        }
        .input-wrapper i {
            position: absolute; left: .8rem; top: 50%; transform: translateY(-50%);
            color: #94a3b8; font-size: .9rem;
        }
        .form-input {
            width: 100%; padding: .7rem .8rem .7rem 2.4rem;
            border: 2px solid #e2e8f0; border-radius: 10px;
            font-size: .95rem; transition: all .2s; background: white;
        }
        .form-input:focus { outline: none; border-color: #3b82f6; box-shadow: 0 0 0 4px rgba(59,130,246,.1); }
        .btn-login {
            width: 100%; padding: .8rem; border: none; border-radius: 10px;
            background: linear-gradient(135deg, #1e40af, #3b82f6);
            color: white; font-size: 1rem; font-weight: 600; cursor: pointer;
            transition: all .2s; margin-top: .5rem;
        }
        .btn-login:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(26,86,219,.4); }
        .alert {
            padding: .6rem 1rem; border-radius: 8px; margin-bottom: 1rem;
            font-size: .85rem; background: #fee2e2; color: #991b1b; border: 1px solid #fecaca;
        }

    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <div class="icon"><i class="fas fa-brain"></i></div>
            <h1>承IT之基 · 启AI之智</h1>
            <p>《Python程序设计》课程实验系统</p>
        </div>
        <div class="login-card">
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="alert">{{ message }}</div>
                    {% endfor %}
                {% endif %}
            {% endwith %}

            <form method="POST">
                <div class="form-group">
                    <label class="form-label">用户名</label>
                    <div class="input-wrapper">
                        <i class="fas fa-user"></i>
                        <input type="text" name="username" class="form-input" id="username" placeholder="请输入用户名" required>
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label">密码</label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock"></i>
                        <input type="password" name="password" class="form-input" id="password" placeholder="请输入密码" required>
                    </div>
                </div>
                <button type="submit" class="btn-login">
                    <i class="fas fa-sign-in-alt"></i> 登 录
                </button>
            </form>

        </div>
    </div>
</body>
</html>
